name: Deploy

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: self-hosted
    steps:
      - uses: actions/checkout@v4

      - name: Pull latest and rebuild
        run: |
          docker compose pull
          docker compose up -d --build

      - name: Health check
        run: |
          sleep 5
          curl -f http://localhost:9090/-/healthy || exit 1
          curl -f http://localhost:4000/health || exit 1
