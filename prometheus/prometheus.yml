global:
  scrape_interval: 15s
  evaluation_interval: 15s

alerting:
  alertmanagers:
    - static_configs:
        - targets: ['alertmanager:9093']

rule_files:
  - /etc/prometheus/rules/*.yml

scrape_configs:
  # Mac Mini (Docker - CPU/Memory)
  - job_name: 'node-mac'
    static_configs:
      - targets: ['node-exporter:9100']
        labels:
          host: 'mac'

  # Mac Mini (Native - Disk/Filesystem)
  - job_name: 'node-mac-native'
    static_configs:
      - targets: ['host.docker.internal:9101']
        labels:
          host: 'mac'

  - job_name: 'cadvisor-mac'
    static_configs:
      - targets: ['cadvisor:8080']
        labels:
          host: 'mac'

  # Windows PC (via Cloudflare Tunnel)
  - job_name: 'node-windows'
    scheme: https
    metrics_path: /node-exporter/metrics
    static_configs:
      - targets: ['monitoring-windows.nuclearbomb6518.com']
        labels:
          host: 'windows'

  - job_name: 'cadvisor-windows'
    scheme: https
    metrics_path: /cadvisor/metrics
    static_configs:
      - targets: ['monitoring-windows.nuclearbomb6518.com']
        labels:
          host: 'windows'

  - job_name: 'pm2-windows'
    scheme: https
    metrics_path: /pm2/metrics
    static_configs:
      - targets: ['monitoring-windows.nuclearbomb6518.com']
        labels:
          host: 'windows'

  # External HTTP probes (Blackbox Exporter)
  - job_name: 'blackbox-external'
    metrics_path: /probe
    params:
      module: [http_2xx]
    static_configs:
      - targets:
          - https://boldgobynd.vercel.app/
        labels:
          service: studiobold
    relabel_configs:
      - source_labels: [__address__]
        target_label: __param_target
      - source_labels: [__param_target]
        target_label: instance
      - target_label: __address__
        replacement: blackbox-exporter:9115

  # Prometheus self-monitoring
  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']
