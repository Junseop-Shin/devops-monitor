global:
  scrape_interval: 15s
  evaluation_interval: 15s

alerting:
  alertmanagers:
    - static_configs:
        - targets: ['alertmanager:9093']

rule_files:
  - /etc/prometheus/rules/*.yml

scrape_configs:
  # Mac Mini
  - job_name: 'node-mac'
    static_configs:
      - targets: ['node-exporter:9100']
        labels:
          host: 'mac'

  - job_name: 'cadvisor-mac'
    static_configs:
      - targets: ['cadvisor:8080']
        labels:
          host: 'mac'

  # Windows PC (via Cloudflare Tunnel)
  - job_name: 'node-windows'
    scheme: https
    metrics_path: /node-exporter/metrics
    static_configs:
      - targets: ['monitoring-windows.nuclearbomb6518.com']
        labels:
          host: 'windows'

  - job_name: 'cadvisor-windows'
    scheme: https
    metrics_path: /cadvisor/metrics
    static_configs:
      - targets: ['monitoring-windows.nuclearbomb6518.com']
        labels:
          host: 'windows'

  # Prometheus self-monitoring
  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']
