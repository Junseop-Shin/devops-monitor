server:
  http_listen_port: 9080
  grpc_listen_port: 0

positions:
  filename: /tmp/positions.yaml

clients:
  - url: http://loki:3100/loki/api/v1/push

scrape_configs:
  # Docker container logs
  - job_name: docker
    docker_sd_configs:
      - host: unix:///var/run/docker.sock
        refresh_interval: 5s
    relabel_configs:
      - source_labels: ['__meta_docker_container_name']
        regex: '/(.*)'
        target_label: 'container'
      - source_labels: ['__meta_docker_container_log_stream']
        target_label: 'stream'
      - source_labels: ['__meta_docker_container_label_com_docker_compose_service']
        target_label: 'service'
      - target_label: 'host'
        replacement: 'windows'
    pipeline_stages:
      - docker: {}
      - regex:
          expression: '^(?P<glog_level>[IWEF])\d{4}\s'
      - template:
          source: glog_level
          template: '{{ if eq .Value "I" }}info{{ else if eq .Value "W" }}warning{{ else if eq .Value "E" }}error{{ else if eq .Value "F" }}fatal{{ else }}{{ end }}'
      - labels:
          glog_level:

  # PM2 process logs
  - job_name: pm2
    static_configs:
      - targets:
          - localhost
        labels:
          job: pm2
          host: windows
          __path__: /pm2-logs/*.log
    relabel_configs:
      - source_labels: [__path__]
        regex: '/pm2-logs/(.+?)-(out|error)(?:-\d+)?\.log$'
        target_label: service
        replacement: '${1}'
      - source_labels: [__path__]
        regex: '/pm2-logs/.+?-(out|error)(?:-\d+)?\.log$'
        target_label: stream
        replacement: '${1}'
    pipeline_stages:
      - match:
          selector: '{stream="error"}'
          stages:
            - static_labels:
                level: error
      - match:
          selector: '{stream="out"}'
          stages:
            - regex:
                expression: '(?i)(?:^|\s)(?P<pm2_level>error|warn|warning|info|debug)[\s:\[]'
            - template:
                source: pm2_level
                template: '{{ ToLower .Value }}'
            - labels:
                pm2_level:
