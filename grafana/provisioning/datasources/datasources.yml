apiVersion: 1

datasources:
  - name: Prometheus
    type: prometheus
    uid: prometheus
    access: proxy
    url: http://prometheus:9090
    isDefault: true

  - name: Loki
    type: loki
    uid: loki
    access: proxy
    url: http://loki:3100

  - name: TimescaleDB
    type: postgres
    uid: timescaledb
    url: timescaledb:5432
    database: analytics
    user: monitor
    secureJsonData:
      password: ${GRAFANA_PASSWORD}
    jsonData:
      sslmode: disable
      timescaledb: true
